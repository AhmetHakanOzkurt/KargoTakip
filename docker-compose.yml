services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "KargoTakip123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - kargo-network

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kargo-network

  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KargoTakipDB;User Id=sa;Password=KargoTakip123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=bu-cok-gizli-bir-anahtar-en-az-32-karakter-olmali
      - JwtSettings__Issuer=KargoTakip
      - JwtSettings__Audience=KargoTakipUsers
      - JwtSettings__ExpiryInHours=8
    depends_on:
      - sqlserver
    networks:
      - kargo-network

  order-service:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KargoTakipDB;User Id=sa;Password=KargoTakip123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=bu-cok-gizli-bir-anahtar-en-az-32-karakter-olmali
      - JwtSettings__Issuer=KargoTakip
      - JwtSettings__Audience=KargoTakipUsers
      - JwtSettings__ExpiryInHours=8
      - RabbitMQ__HostName=rabbitmq
      - VehicleService__BaseUrl=http://vehicle-service:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_started
      vehicle-service:
        condition: service_started
    networks:
      - kargo-network

  vehicle-service:
    build:
      context: .
      dockerfile: VehicleService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KargoTakipDB;User Id=sa;Password=KargoTakip123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=bu-cok-gizli-bir-anahtar-en-az-32-karakter-olmali
      - JwtSettings__Issuer=KargoTakip
      - JwtSettings__Audience=KargoTakipUsers
      - JwtSettings__ExpiryInHours=8
    depends_on:
      - sqlserver
    networks:
      - kargo-network

  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KargoTakipDB;User Id=sa;Password=KargoTakip123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=bu-cok-gizli-bir-anahtar-en-az-32-karakter-olmali
      - JwtSettings__Issuer=KargoTakip
      - JwtSettings__Audience=KargoTakipUsers
      - JwtSettings__ExpiryInHours=8
      - RabbitMQ__HostName=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_started
    networks:
      - kargo-network

  report-service:
    build:
      context: .
      dockerfile: ReportService/Dockerfile
    ports:
      - "5005:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KargoTakipDB;User Id=sa;Password=KargoTakip123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=bu-cok-gizli-bir-anahtar-en-az-32-karakter-olmali
      - JwtSettings__Issuer=KargoTakip
      - JwtSettings__Audience=KargoTakipUsers
      - JwtSettings__ExpiryInHours=8
    depends_on:
      - sqlserver
    networks:
      - kargo-network

networks:
  kargo-network:
    driver: bridge

volumes:
  sqlserver_data: